<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>눈썹 점프 3D</title>
<style>
  body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(160deg, #2b1055, #7b2d6b 55%, #ff7e5f);
    color: #fff;
    display: flex; flex-direction: column; align-items: center;
    padding: 16px; min-height: 100vh; box-sizing: border-box;
  }
  h1 { margin: 8px 0; font-size: 26px; text-shadow: 2px 2px 0 #00000040; letter-spacing: 1px; }
  #wrap { position: relative; width: 1024px; max-width: 98vw; }
  #video {
    position: absolute; top: 8px; right: 8px; width: 180px;
    border: 2px solid #ffd56b; border-radius: 8px;
    transform: scaleX(-1); z-index: 3;
  }
  #game { width: 100%; background: #2b1055; border-radius: 12px; display: block; box-shadow: 0 10px 30px #00000060; }

  /* HUD 오버레이 (캔버스 위에 HTML로) */
  #hud {
    position: absolute; left: 14px; top: 12px; z-index: 2;
    background: rgba(0,0,0,0.35); color: #ffd56b;
    font-weight: bold; font-size: 20px; padding: 6px 14px; border-radius: 8px;
  }
  #flash {
    position: absolute; inset: 0; z-index: 2; pointer-events: none;
    background: #ff4646; opacity: 0; border-radius: 12px;
  }
  /* 타이틀(시작) 화면 */
  #title {
    position: absolute; inset: 0; z-index: 4;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(circle at 50% 34%, rgba(43,16,85,0.45), rgba(8,3,22,0.86));
    border-radius: 12px; text-align: center;
  }
  #title.hidden { display: none; }
  #titleLogo { font-size: 84px; line-height: 1; animation: bob 1.8s ease-in-out infinite; filter: drop-shadow(0 6px 10px #0009); }
  #titleName {
    margin: 6px 0 8px; font-size: 42px; font-weight: 900; letter-spacing: 2px;
    background: linear-gradient(180deg,#ffe9a8,#ff9d5c);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 3px 0 #00000035);
  }
  #titleTag { color: #ffeede; font-size: 15px; opacity: .92; margin-bottom: 24px; }
  #startBtn {
    margin: 0; padding: 14px 40px; font-size: 23px; font-weight: 900;
    color: #5a2a66; background: linear-gradient(180deg,#ffe27a,#ffc24b);
    border: none; border-radius: 40px; cursor: pointer; letter-spacing: 1px;
    box-shadow: 0 6px 0 #c98a1e, 0 12px 24px #0008;
    animation: pulse 1.4s ease-in-out infinite;
  }
  #startBtn:hover { filter: brightness(1.07); }
  #startBtn:active { transform: translateY(4px); box-shadow: 0 2px 0 #c98a1e, 0 6px 12px #0008; }
  #titleHint { margin-top: 16px; color: #d2bfe0; font-size: 13px; }
  @keyframes bob   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
  #center {
    position: absolute; inset: 0; z-index: 2;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; pointer-events: none;
  }
  #center.hidden { display: none; }
  #cTitle { font-size: 28px; font-weight: bold; text-shadow: 2px 2px 0 #0006; }
  #cSub { font-size: 15px; color: #cdeafe; margin-top: 8px; }
  #cHint { font-size: 12px; color: #d9c5d0; margin-top: 10px; }
  #cBarWrap { width: 300px; height: 12px; background: #0006; border-radius: 6px; margin-top: 14px; overflow: hidden; }
  #cBar { height: 100%; width: 0%; background: #4cc9f0; }

  #status { margin-top: 10px; font-size: 14px; color: #ffe; text-align: center; min-height: 20px; }
  .bar-wrap { width: 1024px; max-width: 98vw; height: 14px; background: #0004; border-radius: 7px; margin-top: 8px; overflow: hidden; }
  .bar { height: 100%; width: 0%; background: #4cc9f0; transition: width .05s; }
  button {
    margin-top: 12px; padding: 8px 18px; font-size: 15px;
    background: #ffd56b; color: #5a2a66; border: none; border-radius: 8px;
    cursor: pointer; font-weight: bold;
  }
</style>
</head>
<body>
  <h1>🦊 눈썹 점프 3D</h1>
  <div id="wrap">
    <canvas id="game" width="1024" height="576"></canvas>
    <video id="video" autoplay muted playsinline style="display:none"></video>
    <div id="hud">⭐ 0</div>
    <div id="flash"></div>
    <div id="title">
      <div>
        <div id="titleLogo">🦊</div>
        <div id="titleName">눈썹 점프 3D</div>
        <div id="titleTag">눈썹을 올리면 점프! 🌵🪨 장애물을 피해 달려요!</div>
        <button id="startBtn">▶ 시작하기</button>
        <div id="titleHint">또는 Space / Enter 키 · 시작하면 카메라를 허용해 주세요</div>
      </div>
    </div>
    <div id="center" class="hidden">
      <div id="cTitle"></div>
      <div id="cSub"></div>
      <div id="cBarWrap"><div id="cBar"></div></div>
      <div id="cHint"></div>
    </div>
  </div>
  <div class="bar-wrap"><div id="bar" class="bar"></div></div>
  <div id="status">▶ 시작하기 버튼을 눌러 게임을 시작하세요</div>
  <button id="resetBtn">다시 시작 (R)</button>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from "three";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

const canvas   = document.getElementById("game");
const video    = document.getElementById("video");
const statusEl = document.getElementById("status");
const barEl    = document.getElementById("bar");
const hudEl    = document.getElementById("hud");
const centerEl = document.getElementById("center");
const cTitle   = document.getElementById("cTitle");
const cSub     = document.getElementById("cSub");
const cHint    = document.getElementById("cHint");
const cBar     = document.getElementById("cBar");
const flashEl  = document.getElementById("flash");
const titleEl  = document.getElementById("title");
const startBtn = document.getElementById("startBtn");

// ── 게임 상태 ─────────────────────────────────────────────
let player, obstacles, score, gameOver, speed, lastMilestone, paused, spawnTimer, shake, tumbleTimer;
let flashV = 0, frame3d = 0;   // 빨간 플래시 세기 / 프레임 카운터
let screen = "title", started = false;   // title → game

// 물리 (월드 단위) — 점프 정점 ≈ 2.84, 체공 ≈ 35프레임
const GRAVITY = 0.018;
const JUMP_POWER = 0.32;
const FOX_HALF = 0.5;     // 충돌용 여우 반폭
const SPAWN_X = 26;       // 선인장이 생성되는 먼 위치(+x)
const DESPAWN_X = -12;

function reset() {
  player = { y: 0, vy: 0, onGround: true, squash: 0 };
  // 기존 선인장 메쉬 제거
  if (obstacles) for (const o of obstacles) scene.remove(o.group);
  obstacles = [];
  // 파티클 제거
  if (typeof parts !== "undefined" && parts) {
    for (const m of parts) { scene.remove(m); m.material.dispose(); }
    parts = [];
  }
  score = 0;
  speed = 0.22;
  gameOver = false;
  lastMilestone = 0;
  paused = false;
  spawnTimer = 70;
  tumbleTimer = 120;
  shake = 0;
  flashV = 0;
  if (foxRoot) { foxRoot.position.set(0, 0, 0); foxRoot.scale.set(1, 1, 1); }
}

// ── 효과음 (Web Audio) ────────────────────────────────────
let audioCtx = null;
function initAudio() {
  if (!audioCtx) { const AC = window.AudioContext || window.webkitAudioContext; if (AC) audioCtx = new AC(); }
  if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
}
function beep(freq, dur, type, vol, slideTo) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
  osc.type = type; osc.frequency.setValueAtTime(freq, t);
  if (slideTo) osc.frequency.exponentialRampToValueAtTime(slideTo, t + dur);
  gain.gain.setValueAtTime(vol, t);
  gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + dur);
}
const sfxJump  = () => beep(320, 0.18, "square",   0.18, 760);
const sfxHit   = () => beep(220, 0.45, "sawtooth", 0.25, 60);
const sfxScore = () => beep(880, 0.08, "square",   0.12);
window.addEventListener("pointerdown", initAudio, { once: true });
window.addEventListener("keydown", initAudio, { once: true });

function jump() {
  if (player.onGround && !gameOver && !paused && phase === "play") {
    player.vy = JUMP_POWER;
    player.onGround = false;
    sfxJump();
  }
}

// ── 눈썹 감지 + 보정 (원본과 동일) ────────────────────────
const L_BROW = 105, L_EYE = 159, R_BROW = 334, R_EYE = 386;
const FACE_TOP = 10, FACE_BOTTOM = 152;

let smooth = null, wasRaised = false;
let phase = "neutral";            // neutral → raised → play
let phaseTimer = 0;
const PREP = 75, SAMPLE = 60;
let neutralSamples = [], raisedSamples = [];
let neutralVal = 0, raisedVal = 0, threshold = 0;
let calibTitle = "", calibSub = "", calibProgress = 0;
const avg = (arr) => arr.reduce((a, b) => a + b, 0) / arr.length;

function startCalibration() { phase = "neutral"; phaseTimer = 0; neutralSamples = []; raisedSamples = []; }

function onFaceResults(results) {
  if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) {
    statusEl.textContent = "얼굴이 안 보여요. 카메라 정면을 봐주세요.";
    return;
  }
  const lm = results.multiFaceLandmarks[0];
  const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
  const faceHeight = dist(lm[FACE_TOP], lm[FACE_BOTTOM]);
  const browEye = (dist(lm[L_BROW], lm[L_EYE]) + dist(lm[R_BROW], lm[R_EYE])) / 2;
  const rawValue = browEye / faceHeight;
  smooth = (smooth === null) ? rawValue : smooth * 0.5 + rawValue * 0.5;

  if (phase === "neutral") {
    phaseTimer++;
    calibTitle = "① 평상시 표정을 지어주세요";
    if (phaseTimer <= PREP) { calibSub = "잠시 후 측정합니다... " + Math.ceil((PREP - phaseTimer) / 30); calibProgress = 0; }
    else { neutralSamples.push(smooth); calibSub = "측정 중... 가만히 계세요"; calibProgress = (phaseTimer - PREP) / SAMPLE; }
    if (phaseTimer > PREP + SAMPLE) { neutralVal = avg(neutralSamples); phase = "raised"; phaseTimer = 0; }
    statusEl.textContent = "보정 1/2 — 평상시 표정";

  } else if (phase === "raised") {
    phaseTimer++;
    calibTitle = "② 눈썹을 위로 올려주세요 🤨";
    if (phaseTimer <= PREP) { calibSub = "눈썹을 올린 채 기다리세요... " + Math.ceil((PREP - phaseTimer) / 30); calibProgress = 0; }
    else { raisedSamples.push(smooth); calibSub = "측정 중... 눈썹 올린 상태 유지!"; calibProgress = (phaseTimer - PREP) / SAMPLE; }
    if (phaseTimer > PREP + SAMPLE) {
      raisedVal = avg(raisedSamples);
      if (raisedVal <= neutralVal + 0.003) raisedVal = neutralVal + 0.03;
      threshold = neutralVal + (raisedVal - neutralVal) * 0.4;
      phase = "play"; phaseTimer = 0;
    }
    statusEl.textContent = "보정 2/2 — 눈썹 올린 표정";

  } else {
    const isRaised = smooth > threshold;
    if (isRaised && !wasRaised) jump();
    wasRaised = isRaised;
    const pct = (smooth - neutralVal) / (raisedVal - neutralVal) * 100;
    barEl.style.width = Math.min(100, Math.max(0, pct)) + "%";
    barEl.style.background = isRaised ? "#f72585" : "#4cc9f0";
    statusEl.textContent = isRaised ? "🤨 눈썹 올림 → 점프!" : "눈썹을 올려서 점프 ( P=일시정지, C=재보정 )";
  }
}

// ══════════════════════════════════════════════════════════
//  THREE.JS 3D 씬
// ══════════════════════════════════════════════════════════
const W = 1024, H = 576;
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(W, H, false);
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0xd98a5e, 16, 52);   // 따뜻한 모래 안개 — 멀리 흐려지며 자연스럽게

// 하늘 그라데이션 배경
function makeSkyTexture() {
  const c = document.createElement("canvas"); c.width = 4; c.height = 256;
  const g = c.getContext("2d");
  const grd = g.createLinearGradient(0, 0, 0, 256);
  grd.addColorStop(0.00, "#241a52");
  grd.addColorStop(0.34, "#4a2a72");
  grd.addColorStop(0.60, "#b5556a");
  grd.addColorStop(0.82, "#ef8a5a");
  grd.addColorStop(1.00, "#f6c97e");
  g.fillStyle = grd; g.fillRect(0, 0, 4, 256);
  const t = new THREE.CanvasTexture(c);
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}
scene.background = makeSkyTexture();

const camera = new THREE.PerspectiveCamera(48, W / H, 0.1, 100);
const CAM_BASE = new THREE.Vector3(-3.6, 2.7, 8.2);
camera.position.copy(CAM_BASE);
camera.lookAt(1.6, 1.0, 0);

// 조명
scene.add(new THREE.HemisphereLight(0xffd9c0, 0x402040, 1.1));
const sun = new THREE.DirectionalLight(0xffe6c0, 1.6);
sun.position.set(-6, 10, 6);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.left = -15; sun.shadow.camera.right = 15;
sun.shadow.camera.top = 15; sun.shadow.camera.bottom = -15;
sun.shadow.camera.near = 1; sun.shadow.camera.far = 40;
scene.add(sun);

// 바닥 (스크롤되는 모래)
function makeGroundTexture() {
  const c = document.createElement("canvas"); c.width = 128; c.height = 128;
  const g = c.getContext("2d");
  g.fillStyle = "#e0a868"; g.fillRect(0, 0, 128, 128);
  g.fillStyle = "#cf9858";
  for (let i = 0; i < 24; i++) {
    const x = Math.random() * 128, y = Math.random() * 128;
    g.fillRect(x, y, 10, 4);
  }
  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(30, 30);
  return t;
}
const groundTex = makeGroundTexture();
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(120, 40),
  new THREE.MeshStandardMaterial({ map: groundTex, roughness: 1 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.set(20, 0, 0);
ground.receiveShadow = true;
scene.add(ground);

// 달
const moon = new THREE.Mesh(
  new THREE.SphereGeometry(2.2, 24, 24),
  new THREE.MeshBasicMaterial({ color: 0xfdf2c4 })
);
moon.position.set(10, 8, -18);
scene.add(moon);
// 달무리
const moonGlow = new THREE.Mesh(
  new THREE.SphereGeometry(3.4, 24, 24),
  new THREE.MeshBasicMaterial({ color: 0xfff3c8, transparent: true, opacity: 0.18 })
);
moonGlow.position.copy(moon.position);
scene.add(moonGlow);

// 별 (Points)
const starGeo = new THREE.BufferGeometry();
const starPos = [];
for (let i = 0; i < 320; i++) {
  starPos.push((Math.random() - 0.5) * 120, 5 + Math.random() * 34, -16 - Math.random() * 22);
}
starGeo.setAttribute("position", new THREE.Float32BufferAttribute(starPos, 3));
const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({
  color: 0xffffff, size: 0.16, sizeAttenuation: true, transparent: true, opacity: 0.9
}));
scene.add(stars);

// ── 3D 배경 풍경 (둥근 모래언덕 + 메사 바위) — 패럴랙스 ──
const scenery = [];   // { mesh, parallax }
const SCN_WRAP = 60;  // ±60 밖으로 나가면 반대편으로 순환

// 빛 받는 둥근 모래언덕 (실제 3D 지오메트리)
function makeDune(color) {
  return new THREE.Mesh(
    new THREE.SphereGeometry(1, 16, 12),
    new THREE.MeshStandardMaterial({ color, roughness: 1 })
  );
}
const duneBands = [
  { z: -21, color: 0xa9744c, yBase: -0.6, sxMin: 7,   sxMax: 11, syMin: 1.4, syMax: 2.0, par: 0.22, count: 6 },
  { z: -15, color: 0xc28e58, yBase: -0.5, sxMin: 5.5, sxMax: 9,  syMin: 1.2, syMax: 1.7, par: 0.42, count: 7 },
  { z: -10, color: 0xd9a96a, yBase: -0.45, sxMin: 4,  sxMax: 7,  syMin: 1.0, syMax: 1.4, par: 0.62, count: 7 },
];
duneBands.forEach(b => {
  const span = (SCN_WRAP * 2) / b.count;
  for (let i = 0; i < b.count; i++) {
    const d = makeDune(b.color);
    const sx = b.sxMin + Math.random() * (b.sxMax - b.sxMin);
    const sy = b.syMin + Math.random() * (b.syMax - b.syMin);
    d.scale.set(sx, sy, sx * 0.7);
    d.position.set(-SCN_WRAP + i * span + Math.random() * span * 0.5, b.yBase, b.z + Math.random() * 1.5);
    scene.add(d);
    scenery.push({ mesh: d, parallax: b.par });
  }
});

// ── 배경 랜드마크 GLB (피라미드 / 사막 마을) — 패럴랙스 ──
// 모델을 목표 높이로 정규화 + 바닥 y=0, 좌우 중심을 holder 그룹 원점에 맞춤
function makeProp(node, targetH) {
  let box = new THREE.Box3().setFromObject(node);
  const size = new THREE.Vector3(); box.getSize(size);
  node.scale.setScalar(targetH / size.y);
  box = new THREE.Box3().setFromObject(node);
  const c = new THREE.Vector3(); box.getCenter(c);
  node.position.x -= c.x; node.position.z -= c.z;
  node.position.y -= box.min.y;
  node.traverse(o => { if (o.isMesh) o.castShadow = true; });
  const holder = new THREE.Group();
  holder.add(node);
  return holder;
}
function loadSceneryProps() {
  const loader = new GLTFLoader();
  // 피라미드 4개 (멀리, 크게)
  loader.load(encodeURI("model/Pyramid.glb"), (g) => {
    for (let i = 0; i < 4; i++) {
      const prop = makeProp(g.scene.clone(true), 5.5 + Math.random() * 3.5);
      prop.position.set(-SCN_WRAP + i * (SCN_WRAP * 2 / 4) + Math.random() * 10, 0, -23 - Math.random() * 6);
      prop.rotation.y = Math.random() * Math.PI * 2;
      scene.add(prop);
      scenery.push({ mesh: prop, parallax: 0.18 });
    }
  }, undefined, (e) => console.warn("Pyramid 로드 실패:", e));
  // 사막 마을 2곳 (랜드마크)
  loader.load(encodeURI("model/Little Desert Town.glb"), (g) => {
    for (let i = 0; i < 2; i++) {
      const prop = makeProp(g.scene.clone(true), 3.2 + Math.random() * 1.5);
      prop.position.set(-28 + i * 46 + Math.random() * 12, 0, -17 - Math.random() * 4);
      prop.rotation.y = Math.random() * Math.PI * 2;
      scene.add(prop);
      scenery.push({ mesh: prop, parallax: 0.32 });
    }
  }, undefined, (e) => console.warn("Desert Town 로드 실패:", e));
}
loadSceneryProps();

// ── 둥실 떠다니는 구름 ────────────────────────────────────
const clouds = [];
function makeCloud() {
  const g = new THREE.Group();
  const mat = new THREE.MeshBasicMaterial({ color: 0xfff3f0, transparent: true, opacity: 0.85, fog: true });
  for (const p of [[0, 0, 1.4], [1.4, 0.2, 1.1], [-1.4, 0.1, 1.0], [0.6, 0.7, 0.95], [-0.6, 0.5, 0.9]]) {
    const s = new THREE.Mesh(new THREE.SphereGeometry(p[2], 10, 8), mat);
    s.position.set(p[0], p[1], 0); g.add(s);
  }
  return g;
}
for (let i = 0; i < 4; i++) {
  const cloud = makeCloud();
  cloud.position.set(-30 + i * 18, 9 + Math.random() * 4, -11 - Math.random() * 3);
  const sc = 0.8 + Math.random() * 0.7; cloud.scale.setScalar(sc);
  scene.add(cloud);
  clouds.push({ mesh: cloud, spd: 0.02 + Math.random() * 0.02 });
}

// ── 3D 파티클 (먼지 / 폭발) ───────────────────────────────
const pGeo = new THREE.SphereGeometry(0.07, 6, 6);
let parts = [];
function addPart(x, y, z, vx, vy, vz, life, color, grav, scl) {
  const m = new THREE.Mesh(pGeo, new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 }));
  m.position.set(x, y, z); m.scale.setScalar(scl);
  m.userData = { vx, vy, vz, life, maxLife: life, grav };
  scene.add(m); parts.push(m);
}
function spawnDust() {
  for (let i = 0; i < 2; i++)
    addPart((Math.random() - 0.5) * 0.3, 0.06, (Math.random() - 0.5) * 0.5,
      -0.04 - Math.random() * 0.04, 0.02 + Math.random() * 0.03, (Math.random() - 0.5) * 0.02,
      24 + Math.random() * 10, 0xe0a868, -0.0016, 0.5 + Math.random() * 0.5);
}
function spawnLandDust() {
  for (let i = 0; i < 12; i++) {
    const a = Math.random() * Math.PI * 2, sp = 0.03 + Math.random() * 0.06;
    addPart(Math.cos(a) * 0.2, 0.06, Math.sin(a) * 0.2, Math.cos(a) * sp, 0.02 + Math.random() * 0.05, Math.sin(a) * sp,
      22 + Math.random() * 12, 0xe0a868, -0.0016, 0.5 + Math.random() * 0.7);
  }
}
function spawnExplosion(x, y, z) {
  const cols = [0xff6b6b, 0xffd56b, 0xffa03c, 0xffffff];
  for (let i = 0; i < 44; i++) {
    const a = Math.random() * Math.PI * 2, b = (Math.random() - 0.5) * Math.PI, sp = 0.06 + Math.random() * 0.16;
    addPart(x, y, z, Math.cos(a) * Math.cos(b) * sp, Math.sin(b) * sp + 0.04, Math.sin(a) * Math.cos(b) * sp,
      30 + Math.random() * 26, cols[(Math.random() * cols.length) | 0], -0.004, 0.6 + Math.random() * 0.9);
  }
}
function updateParts() {
  for (const m of parts) {
    const u = m.userData;
    m.position.x += u.vx; m.position.y += u.vy; m.position.z += u.vz;
    u.vy += u.grav; u.life--;
    if (m.position.y < 0.03) { m.position.y = 0.03; u.vy *= -0.3; u.vx *= 0.7; u.vz *= 0.7; }
    m.material.opacity = Math.max(0, u.life / u.maxLife);
  }
  parts = parts.filter(m => {
    if (m.userData.life <= 0) { scene.remove(m); m.material.dispose(); return false; }
    return true;
  });
}

// ── 선인장 생성 (3D 도형, GLB 로드 실패 시 폴백) ──────────
const cactusMat = new THREE.MeshStandardMaterial({ color: 0x3f8f4f, roughness: 0.8 });
function createPrimitiveCactus() {
  const group = new THREE.Group();
  const h = 0.9 + Math.random() * 1.0;     // 몸통 높이 0.9~1.9
  const r = 0.22 + Math.random() * 0.06;
  const body = new THREE.Mesh(new THREE.CylinderGeometry(r, r, h, 10), cactusMat);
  body.position.y = h / 2; body.castShadow = true;
  group.add(body);
  // 둥근 머리
  const cap = new THREE.Mesh(new THREE.SphereGeometry(r, 10, 8), cactusMat);
  cap.position.y = h; cap.castShadow = true;
  group.add(cap);
  // 팔 (한쪽 또는 양쪽)
  function arm(side) {
    const a = new THREE.Group();
    const ah = 0.3 + Math.random() * 0.25;
    const horiz = new THREE.Mesh(new THREE.CylinderGeometry(r * 0.6, r * 0.6, 0.36, 8), cactusMat);
    horiz.rotation.z = Math.PI / 2; horiz.position.set(side * 0.28, 0, 0); horiz.castShadow = true;
    const up = new THREE.Mesh(new THREE.CylinderGeometry(r * 0.6, r * 0.6, ah, 8), cactusMat);
    up.position.set(side * 0.44, ah / 2, 0); up.castShadow = true;
    a.add(horiz); a.add(up);
    a.position.y = h * (0.45 + Math.random() * 0.2);
    return a;
  }
  if (Math.random() < 0.7) group.add(arm(1));
  if (Math.random() < 0.5) group.add(arm(-1));

  group.position.set(SPAWN_X, 0, 0);
  group.userData = { halfW: r + 0.36, height: h + r };
  scene.add(group);
  return { group, halfW: r + 0.36, height: h + r };
}

// ── GLB 장애물(선인장/바위) 프리로드 후 랜덤 출현 ─────────
const cactusTemplates = [];
const cactusFiles = [
  { url: "model/Cactus.glb",        hMin: 1.3, hMax: 2.2 },   // 키 큰 선인장
  { url: "model/Barrel cactus.glb", hMin: 0.8, hMax: 1.3 },   // 낮고 넓은 통선인장
  { url: "model/Rock Large.glb",    hMin: 0.9, hMax: 1.5 },   // 큰 바위 (더 큼)
  { url: "model/Rock.glb",          hMin: 0.7, hMax: 1.1 },   // 작은 바위 (더 큼)
];
function prepCactusTemplate(node) {
  // 단위 높이(1)로 정규화 + 바닥을 y=0, 좌우 중심 맞춤
  let box = new THREE.Box3().setFromObject(node);
  const size = new THREE.Vector3(); box.getSize(size);
  node.scale.setScalar(1 / size.y);
  box = new THREE.Box3().setFromObject(node);
  const c = new THREE.Vector3(); box.getCenter(c);
  node.position.x -= c.x; node.position.z -= c.z;
  node.position.y -= box.min.y;
  node.traverse(o => { if (o.isMesh) o.castShadow = true; });
  box = new THREE.Box3().setFromObject(node);
  const sz = new THREE.Vector3(); box.getSize(sz);
  return { node, halfW: Math.max(sz.x, sz.z) / 2 };
}
function loadCacti() {
  const loader = new GLTFLoader();
  cactusFiles.forEach(cf => {
    loader.load(encodeURI(cf.url),
      (gltf) => {
        const p = prepCactusTemplate(gltf.scene);
        cactusTemplates.push({ node: p.node, halfW: p.halfW, hMin: cf.hMin, hMax: cf.hMax });
      },
      undefined,
      (err) => { console.warn("선인장 GLB 로드 실패:", cf.url, err); }
    );
  });
}
loadCacti();

function createCactus() {
  // 템플릿이 아직 없으면(예: file://) 도형 선인장으로 폴백
  if (!cactusTemplates.length) return createPrimitiveCactus();
  const tpl = cactusTemplates[(Math.random() * cactusTemplates.length) | 0];
  const group = new THREE.Group();
  group.add(tpl.node.clone(true));
  const height = tpl.hMin + Math.random() * (tpl.hMax - tpl.hMin);
  group.scale.setScalar(height);                 // 단위높이 모델 → 최종 높이
  group.rotation.y = Math.random() * Math.PI * 2; // 랜덤 회전으로 다양하게
  group.position.set(SPAWN_X, 0, 0);
  scene.add(group);
  return { group, halfW: tpl.halfW * height, height };
}

// ── 텀블위드 (100점 넘으면 굴러오는 장애물) ───────────────
let tumbleTemplate = null;
new GLTFLoader().load(encodeURI("model/Tumbleweed.glb"),
  (g) => {
    const node = g.scene;
    let box = new THREE.Box3().setFromObject(node);
    const size = new THREE.Vector3(); box.getSize(size);
    node.scale.setScalar(1 / size.y);
    box = new THREE.Box3().setFromObject(node);
    const c = new THREE.Vector3(); box.getCenter(c);
    node.position.sub(c);                       // 중심을 원점으로 → 제자리 회전(굴러가게)
    node.traverse(o => { if (o.isMesh) o.castShadow = true; });
    tumbleTemplate = { node };
  },
  undefined,
  (e) => console.warn("Tumbleweed 로드 실패:", e)
);
function spawnTumbleweed() {
  if (!tumbleTemplate) return;
  const group = new THREE.Group();
  group.add(tumbleTemplate.node.clone(true));
  const d = 0.9 + Math.random() * 0.5;          // 지름
  group.scale.setScalar(d);
  group.position.set(SPAWN_X, d * 0.5, 0);      // 공 중심이 d/2 높이 → 바닥에 얹힘
  scene.add(group);
  obstacles.push({ group, halfW: d * 0.45, height: d * 0.92, roll: true, spd: 1.35 });
}


// ── 여우 캐릭터 (GLB, 실패 시 도형 폴백) ──────────────────
let foxRoot = new THREE.Group();      // 점프용 부모 (y 이동)
let foxMixer = null;
let foxActions = null, currentAction = null;
let foxModel = null, foxBaseY = 0;    // 모델 본체 / 발 높이 기준 (절차적 애니용)
scene.add(foxRoot);

// 애니메이션 전환 (타이틀/대기=Survey, 플레이=Run)
function setFoxAction(name) {
  if (!foxActions) return;
  const next = foxActions[name] || foxActions["Run"] || Object.values(foxActions)[0];
  if (!next || next === currentAction) return;
  next.reset().fadeIn(0.3).play();
  if (currentAction) currentAction.fadeOut(0.3);
  currentAction = next;
}

function fitFox(model) {
  // 발이 y=0, 키 ≈ 1.4 가 되도록 정규화
  const box = new THREE.Box3().setFromObject(model);
  const size = new THREE.Vector3(); box.getSize(size);
  const s = 1.4 / size.y;
  model.scale.setScalar(s);
  const box2 = new THREE.Box3().setFromObject(model);
  model.position.y -= box2.min.y;
  model.traverse((o) => { if (o.isMesh) { o.castShadow = true; } });
}

function buildPrimitiveFox() {
  // GLB 로드 실패 시 사용하는 간단한 도형 여우
  const g = new THREE.Group();
  const orange = new THREE.MeshStandardMaterial({ color: 0xef8a3c, roughness: 0.7 });
  const white  = new THREE.MeshStandardMaterial({ color: 0xfbeede, roughness: 0.7 });
  const dark   = new THREE.MeshStandardMaterial({ color: 0x3a2a22, roughness: 0.7 });
  const body = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.7, 0.6), orange); body.position.y = 0.7;
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.55), orange); head.position.set(0.55, 1.0, 0);
  const snout= new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.25, 0.3), white); snout.position.set(0.9, 0.95, 0);
  const nose = new THREE.Mesh(new THREE.BoxGeometry(0.12,0.12,0.12), dark); nose.position.set(1.06,0.98,0);
  const earL = new THREE.Mesh(new THREE.ConeGeometry(0.16, 0.32, 4), orange); earL.position.set(0.45,1.4,0.18);
  const earR = new THREE.Mesh(new THREE.ConeGeometry(0.16, 0.32, 4), orange); earR.position.set(0.45,1.4,-0.18);
  const tail = new THREE.Mesh(new THREE.ConeGeometry(0.22, 0.7, 6), orange); tail.rotation.z = Math.PI/2.3; tail.position.set(-0.7,0.85,0);
  const tailTip = new THREE.Mesh(new THREE.ConeGeometry(0.16,0.3,6), white); tailTip.rotation.z = Math.PI/2.3; tailTip.position.set(-1.0,1.0,0);
  function leg(x,z){ const l=new THREE.Mesh(new THREE.BoxGeometry(0.2,0.45,0.2),dark); l.position.set(x,0.22,z); return l; }
  [body,head,snout,nose,earL,earR,tail,tailTip,leg(0.3,0.2),leg(0.3,-0.2),leg(-0.3,0.2),leg(-0.3,-0.2)]
    .forEach(m => { m.castShadow = true; g.add(m); });
  return g;
}

function loadFox() {
  const loader = new GLTFLoader();
  const url = "https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models@master/2.0/Fox/glTF-Binary/Fox.glb";
  loader.load(url,
    (gltf) => {
      const model = gltf.scene;
      fitFox(model);
      model.rotation.y = Math.PI / 2;   // +x(화면 오른쪽, 선인장 오는 방향) 바라보게
      foxRoot.add(model);
      foxModel = model; foxBaseY = model.position.y;
      // 애니메이션 등록 (Survey/Walk/Run)
      if (gltf.animations && gltf.animations.length) {
        foxMixer = new THREE.AnimationMixer(model);
        foxActions = {};
        gltf.animations.forEach(a => { foxActions[a.name] = foxMixer.clipAction(a); });
        setFoxAction("Survey");   // 타이틀에서는 두리번거리는 대기 동작
      }
      statusEl.textContent = "여우 모델 로드 완료!";
    },
    undefined,
    (err) => {
      console.warn("GLB 로드 실패, 도형 여우로 대체:", err);
      foxModel = buildPrimitiveFox(); foxBaseY = 0;
      foxRoot.add(foxModel);
      statusEl.textContent = "⚠ GLB 로드 실패(file://에선 막힘) → 기본 여우로 진행. http 서버/Vercel에서 정상 로드됩니다.";
    }
  );
}
loadFox();

// ── 게임 루프 ─────────────────────────────────────────────
reset();
const clock = new THREE.Clock();

function updateOverlay() {
  if (screen === "title") { centerEl.classList.add("hidden"); hudEl.style.display = "none"; return; }
  hudEl.style.display = "";
  if (phase !== "play") {
    centerEl.classList.remove("hidden");
    cTitle.textContent = calibTitle;
    cSub.textContent = calibSub;
    cBar.style.width = Math.min(100, calibProgress * 100) + "%";
    cBar.parentElement.style.display = "";
    cHint.textContent = "카메라가 안 잡히면 Enter 키로 키보드(Space) 모드 시작";
  } else if (gameOver) {
    centerEl.classList.remove("hidden");
    cTitle.textContent = "💥 GAME OVER";
    cSub.textContent = "점수 " + Math.floor(score / 10);
    cBar.parentElement.style.display = "none";
    cHint.textContent = "R 키 또는 버튼으로 다시 시작";
  } else if (paused) {
    centerEl.classList.remove("hidden");
    cTitle.textContent = "⏸ 일시정지";
    cSub.textContent = "";
    cBar.parentElement.style.display = "none";
    cHint.textContent = "P 키를 눌러 계속하기";
  } else {
    centerEl.classList.add("hidden");
  }
  hudEl.textContent = "⭐ " + Math.floor(score / 10);
}

function animate() {
  requestAnimationFrame(animate);
  frame3d++;
  const dt = clock.getDelta();
  if (foxMixer && !paused) foxMixer.update(dt);
  setFoxAction((screen === "game" && phase === "play" && !gameOver) ? "Run" : "Survey");

  // 애니메이션 없는(static) 모델용 절차적 달리기 바운스
  if (foxModel && !foxMixer && player) {
    const running = screen === "game" && phase === "play" && !gameOver && !paused && player.onGround;
    if (running) {
      const t = frame3d * 0.35;
      foxModel.position.y = foxBaseY + Math.abs(Math.sin(t)) * 0.09;
      foxModel.rotation.z = Math.sin(t) * 0.06;
    } else {
      foxModel.position.y = foxBaseY;
      foxModel.rotation.z = 0;
    }
  }

  if (phase === "play" && !gameOver && !paused) {
    // 물리 + 착지 임팩트
    const wasAir = !player.onGround;
    player.vy -= GRAVITY;
    player.y += player.vy;
    if (player.y <= 0) {
      player.y = 0; player.vy = 0;
      if (wasAir) { player.squash = 1; spawnLandDust(); }   // 착지 찌그러짐 + 먼지
      player.onGround = true;
    }
    if (player.squash > 0) player.squash = Math.max(0, player.squash - 0.13);
    if (player.onGround && frame3d % 5 === 0) spawnDust();   // 달리는 먼지
    foxRoot.position.y = player.y;

    // 선인장 생성: 거리 ÷ 속도 → 항상 점프로 넘을 수 있는 간격
    spawnTimer--;
    if (spawnTimer <= 0) {
      obstacles.push(createCactus());
      const ramp = Math.min(4, score / 250);
      const minDist = Math.max(7, 10 - ramp);
      const maxDist = Math.max(12, 18 - ramp);
      const distGap = minDist + Math.random() * (maxDist - minDist);
      spawnTimer = Math.round(distGap / speed);
    }

    // 표시 점수 100 넘으면 텀블위드가 굴러옴 (점프로 회피)
    if (Math.floor(score / 10) >= 100) {
      tumbleTimer--;
      if (tumbleTimer <= 0) {
        spawnTumbleweed();
        tumbleTimer = Math.round((22 + Math.random() * 20) / speed);
      }
    }

    // 선인장 이동 + 충돌
    for (const o of obstacles) {
      const v = speed * (o.spd || 1);
      o.group.position.x -= v;
      if (o.roll) o.group.rotation.z += v * 0.9;        // 굴러가는 회전
      const dx = Math.abs(o.group.position.x);          // 여우는 x=0
      if (dx < FOX_HALF + o.halfW && player.y < o.height - 0.15) {
        if (!gameOver) {
          gameOver = true; sfxHit();
          shake = 22; flashV = 0.55;
          spawnExplosion(0, player.y + 0.7, 0);   // 폭발 파티클
        }
      }
    }
    obstacles = obstacles.filter(o => {
      if (o.group.position.x < DESPAWN_X) { scene.remove(o.group); return false; }
      return true;
    });

    score++;
    speed = 0.22 + score * 0.00004;
    groundTex.offset.x += speed * 0.05;   // 바닥 스크롤
    if (Math.floor(score / 100) > lastMilestone) { lastMilestone = Math.floor(score / 100); sfxScore(); }
  }

  // 충돌 카메라 흔들림
  if (shake > 0) {
    camera.position.set(
      CAM_BASE.x + (Math.random() - 0.5) * shake * 0.04,
      CAM_BASE.y + (Math.random() - 0.5) * shake * 0.04,
      CAM_BASE.z
    );
    camera.lookAt(1.6, 1.0, 0);
    shake--;
    if (shake === 0) { camera.position.copy(CAM_BASE); camera.lookAt(1.6, 1.0, 0); }
  }

  // 파티클 (게임오버 후에도 폭발이 퍼지도록 !paused면 갱신)
  if (!paused) updateParts();

  // 여우 찌그러짐(점프/착지)
  if (player) {
    const sq = player.squash || 0;
    let stretch = 0;
    if (!player.onGround) stretch = Math.max(-0.12, Math.min(0.12, player.vy * 0.4));
    foxRoot.scale.set(1 + sq * 0.18 - stretch * 0.5, 1 - sq * 0.28 + stretch, 1 + sq * 0.18 - stretch * 0.5);
  }

  // 빨간 플래시 페이드
  if (flashV > 0) flashV = Math.max(0, flashV - 0.04);
  flashEl.style.opacity = flashV;

  // 별 반짝임
  stars.material.opacity = 0.65 + 0.3 * Math.sin(frame3d * 0.05);

  // 배경 패럴랙스 (3D 언덕·메사 스크롤 + 구름 표류)
  const bgSpeed = (screen === "game" && phase === "play" && !gameOver && !paused) ? speed : 0.32;
  for (const s of scenery) {
    s.mesh.position.x -= bgSpeed * s.parallax;
    if (s.mesh.position.x < -SCN_WRAP) s.mesh.position.x += SCN_WRAP * 2;
  }
  for (const cl of clouds) {
    cl.mesh.position.x -= cl.spd * (0.4 + bgSpeed * 0.5);
    if (cl.mesh.position.x < -42) cl.mesh.position.x = 42;
  }

  updateOverlay();
  renderer.render(scene, camera);
}
animate();

// ── 키보드 ────────────────────────────────────────────────
document.addEventListener("keydown", (e) => {
  if (screen === "title") {
    if (e.code === "Space" || e.code === "Enter") { e.preventDefault(); startGame(); }
    return;
  }
  if (e.code === "Space") { e.preventDefault(); jump(); }
  if (e.code === "KeyR") reset();
  if (e.code === "KeyC") startCalibration();
  if (e.code === "Enter" && phase !== "play") {
    neutralVal = 0; raisedVal = 1; threshold = 2;   // 눈썹 트리거 비활성 (Space만)
    phase = "play"; reset();
  }
  if ((e.code === "KeyP" || e.code === "Escape") && phase === "play" && !gameOver) {
    paused = !paused;
  }
});
document.getElementById("resetBtn").onclick = reset;

// ── MediaPipe 초기화 (실패해도 게임은 계속) ───────────────
function initFaceTracking() {
  if (typeof FaceMesh === "undefined" || typeof Camera === "undefined") {
    statusEl.textContent = "⚠ 얼굴인식 라이브러리 로드 실패. Enter/Space 키로 플레이 가능.";
    return;
  }
  try {
    const faceMesh = new FaceMesh({
      locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
    });
    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    faceMesh.onResults(onFaceResults);
    const cam = new Camera(video, {
      onFrame: async () => { await faceMesh.send({ image: video }); },
      width: 640, height: 480,
    });
    cam.start()
      .then(() => { statusEl.textContent = "보정을 시작합니다. 화면 안내를 따라주세요."; })
      .catch((err) => { statusEl.textContent = "카메라 접근 실패: " + err.message + " (Enter/Space 가능)"; });
  } catch (err) {
    statusEl.textContent = "얼굴인식 초기화 오류: " + err.message + " (Enter/Space 가능)";
  }
}
// 타이틀 → 게임 시작 (사용자 동작으로 카메라 권한 요청)
function startGame() {
  if (started) return;
  started = true;
  screen = "game";
  titleEl.classList.add("hidden");
  video.style.display = "";
  initAudio();
  reset();
  statusEl.textContent = "카메라를 준비하는 중...";
  initFaceTracking();
}
startBtn.addEventListener("click", startGame);
</script>
</body>
</html>
